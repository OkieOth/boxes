<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SVG UI Prototype</title>
        <!-- Initialize default depth before any other scripts -->
        <script>
            window.formatMixin = "default_formats.yaml";
            window.defaultDepth = 2;
            window.uiVersion = "v1";
            window.renderingVersion = "v1.1.1";
        </script>

        <script src="./js/htmx_1.9.12.min.js"></script>
        <script src="./js/wasm_exec.js"></script>
        <script src="./js/main.js"></script>
        <link
            rel="stylesheet"
            href="./css/font-awesome_6.5.1all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        />
        <link rel="stylesheet" href="./css/main.css" />
    </head>
    <body>
        <!-- Fixed menu (stays put during pan/zoom) -->
        <div id="menu-wrapper">
            <div id="menu">
                <button
                    id="btn-selected-panel"
                    class="tool-btn"
                    hx-on:click="window.svgControls.toggleSelectedCollector()"
                    title="Toggle Selected Mixins"
                >
                    <i class="fa-solid fa-layer-group"></i>
                </button>
                <button
                    title="Zoom +"
                    hx-on:click="window.svgControls.zoom(1.2)"
                >
                    <i class="fa-solid fa-magnifying-glass-plus"></i>
                </button>
                <button
                    title="Zoom -"
                    hx-on:click="window.svgControls.zoom(1/1.2)"
                >
                    <i class="fa-solid fa-magnifying-glass-minus"></i>
                </button>
                <button
                    title="Save current view"
                    hx-on:click="window.svgControls.save()"
                >
                    <i class="fa-solid fa-floppy-disk"></i>
                </button>
                <!-- Updated buttons with IDs and classes -->
                <button
                    id="btn-minimap"
                    class="tool-btn"
                    hx-on:click="window.svgControls.toggleMinimap()"
                    title="Toggle Minimap"
                >
                    <i class="fa-solid fa-map"></i>
                </button>
                <button
                    id="btn-collector"
                    class="tool-btn"
                    hx-on:click="window.svgControls.toggleCollector()"
                    title="Toggle Expanded Box"
                >
                    <i class="fa-solid fa-arrows-up-down"></i>
                </button>
                <!-- Blacklist tool toggle -->
                <button
                    id="btn-blacklist"
                    class="tool-btn"
                    hx-on:click="window.svgControls.toggleBlacklist()"
                    title="Blacklist Mode (Hide Objects)"
                >
                    <i class="fa-solid fa-ban"></i>
                </button>
                <!-- Pan tool toggle -->
                <button
                    id="btn-pan"
                    class="tool-btn"
                    hx-on:click="window.svgControls.togglePanTool()"
                    title="Toggle Pan Tool"
                >
                    <i class="fa-solid fa-arrows-up-down-left-right"></i>
                </button>
                <!-- Manage uploads button -->
                <button
                    id="btn-manage-uploads"
                    class="tool-btn"
                    title="Manage Uploaded Mixins"
                    style="margin-left: 8px"
                >
                    <i class="fa-solid fa-folder-open"></i>
                </button>
                <!-- Search button -->
                <button
                    id="btn-search"
                    class="tool-btn"
                    title="Search Boxes"
                    style="margin-left: 8px"
                >
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <!-- Hide Comments toggle button -->
                <button
                    id="btn-hide-comments"
                    class="tool-btn"
                    title="Toggle Hide Comments"
                    style="margin-left: 8px"
                >
                    <i class="fa-solid fa-comment-slash"></i>
                </button>
                <!-- Connection animation toggle -->
                <button
                    id="btn-connection-anim"
                    class="tool-btn"
                    title="Toggle Connection Animation"
                    style="margin-left: 8px"
                    hx-on:click="window.svgControls.toggleConnectionAnimation()"
                >
                    <i class="fa-solid fa-wave-square"></i>
                </button>
                <!-- Connected render mode toggle -->
                <button
                    id="btn-connected"
                    class="tool-btn"
                    title="Render Connected"
                    style="margin-left: 8px"
                >
                    <i class="fa-solid fa-diagram-project"></i>
                </button>
                <!-- Comment legend panel toggle -->
                <button
                    id="btn-comment-legend"
                    class="tool-btn"
                    title="Toggle Comment Legend Panel"
                    style="margin-left: 8px"
                    hx-on:click="window.svgControls.toggleCommentLegendPanel()"
                >
                    <i class="fa-solid fa-comment-dots"></i>
                </button>
                <!-- Permalink button -->
                <button
                    id="btn-permalink"
                    class="tool-btn"
                    title="Create Permalink"
                    style="margin-left: 8px"
                >
                    <i class="fa-solid fa-link"></i>
                </button>
                <!-- Expand All button -->
                <button
                    id="btn-expand-all"
                    class="tool-btn"
                    title="Expand All (Show All Non-Blacklisted)"
                    style="margin-left: 8px"
                >
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
            <div
                id="toolbar-collapse-handle"
                title="Collapse Toolbar"
                aria-label="Collapse Toolbar"
                role="button"
                tabindex="0"
            ></div>
            <div id="menu-version">
                <span id="toolbar-version-label" aria-live="polite"></span>
            </div>
        </div>

        <!-- Minimap -->
        <div id="minimap" aria-hidden="true" style="display: none">
            <svg
                id="minimap-svg"
                viewBox="0 0 100 100"
                preserveAspectRatio="xMidYMid meet"
            >
                <!-- Scene outline -->
                <rect
                    id="minimap-scene"
                    x="0"
                    y="0"
                    width="100"
                    height="100"
                    fill="none"
                    stroke="#bbb"
                />
                <!-- Preview of content -->
                <g id="minimap-content"></g>
                <!-- Viewport rectangle -->
                <rect
                    id="minimap-vp"
                    class="vp"
                    x="0"
                    y="0"
                    width="10"
                    height="10"
                />
            </svg>
        </div>

        <!-- Badge collector box (now left side) -->
        <div id="selected-collector" aria-live="polite" aria-hidden="false">
            <div class="title">Selected Mixins</div>
            <div class="selected-mixin-controls">
                <div id="toolbar-combobox" class="toolbar-combobox">
                    <div class="toolbar-combo-field">
                        <input
                            id="toolbar-combo-input"
                            class="toolbar-combo-input"
                            type="text"
                            placeholder="Filter mixins..."
                            autocomplete="off"
                            role="combobox"
                            aria-haspopup="listbox"
                            aria-expanded="false"
                            aria-controls="toolbar-combo-dropdown"
                        />
                        <button
                            type="button"
                            id="toolbar-combo-toggle"
                            class="tool-btn toolbar-combo-toggle"
                            aria-label="Show mixin options"
                        >
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                    </div>
                    <div
                        id="toolbar-combo-dropdown"
                        class="toolbar-combo-dropdown hidden"
                        role="listbox"
                        aria-label="Available mixins"
                    ></div>
                    <select
                        id="toolbar-combo"
                        class="toolbar-combo-select"
                        style="display: none"
                    >
                        <option value="" selected>Default</option>
                        <option value="conn1.yaml">
                            Additional Connections 1
                        </option>
                        <option value="conn2.yaml">
                            Additional Connections 2
                        </option>
                    </select>
                </div>
            </div>
            <div id="selected-mixins-list"></div>
        </div>

        <div
            id="collector"
            class="hidden"
            aria-live="polite"
            aria-hidden="true"
        >
            <div class="panel-header">
                <div class="title">Expanded Items</div>
                <a
                    id="link-clear-expanded"
                    class="panel-clear-link"
                    href="#"
                    title="Clear Expanded Items"
                    aria-label="Clear Expanded Items"
                >
                    🗑
                </a>
            </div>
            <div id="badge-list"></div>
        </div>

        <!-- Blacklist collector box (left side, below expanded) -->
        <div
            id="blacklist-collector"
            class="hidden"
            aria-live="polite"
            aria-hidden="true"
        >
            <div class="panel-header">
                <div class="title">Blacklisted Items</div>
                <a
                    id="link-clear-blacklist"
                    class="panel-clear-link"
                    href="#"
                    title="Clear Blacklisted Items"
                    aria-label="Clear Blacklisted Items"
                >
                    🗑
                </a>
            </div>
            <div id="blacklist-list"></div>
        </div>

        <!-- Comment legend floating panel (right side) -->
        <div
            id="comment-legend-panel"
            class="hidden"
            aria-live="polite"
            aria-hidden="true"
        >
            <div class="title">Comment Legend</div>
            <div id="comment-legend-list" class="comment-legend-list"></div>
        </div>

        <div id="canvas">
            <!-- ...existing code... -->
            <!-- SVG will be loaded here via boxes.wasm -->
            <!-- ...existing code... -->
        </div>

        <!-- Global loading spinner overlay -->
        <div id="spinner" class="hidden" aria-hidden="true">
            <div class="spinner-backdrop"></div>
            <div class="spinner-content" role="status" aria-live="polite">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <span>Loading…</span>
            </div>
        </div>

        <!-- Upload refresh toast -->
        <div
            id="upload-refresh-toast"
            class="hidden"
            role="status"
            aria-live="polite"
            aria-hidden="true"
        ></div>

        <!-- Permalink popup -->
        <div
            id="permalink-popup"
            class="hidden"
            tabindex="-1"
            aria-modal="true"
            role="dialog"
            style="
                position: fixed;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -30%);
                background: #fff;
                border: 1px solid #888;
                padding: 1.5em;
                z-index: 1000;
                box-shadow: 0 2px 16px #0002;
                min-width: 320px;
                display: none;
            "
        >
            <div style="margin-bottom: 0.5em; font-weight: bold">Permalink</div>
            <input
                id="permalink-url"
                type="text"
                readonly
                style="width: 100%; margin-bottom: 0.5em; font-size: 1em"
            />
            <button id="permalink-copy-btn" style="width: 100%">
                <i class="fa-solid fa-copy"></i> Copy Link
            </button>
        </div>

        <!-- Manage Uploads popup -->
        <div
            id="uploads-popup"
            class="hidden"
            tabindex="-1"
            aria-modal="true"
            role="dialog"
            style="
                position: fixed;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -30%);
                background: #fff;
                border: 1px solid #888;
                padding: 1.5em;
                z-index: 1000;
                box-shadow: 0 2px 16px #0002;
                min-width: 360px;
                display: none;
            "
        >
            <div
                style="
                    margin-bottom: 0.75em;
                    font-weight: bold;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 8px;
                "
            >
                <span>Manage Uploaded Mixins</span>
                <button
                    id="uploads-close-btn"
                    class="tool-btn"
                    title="Close"
                    style="padding: 4px 8px"
                >
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div
                id="uploads-list"
                style="
                    max-height: 40vh;
                    overflow: auto;
                    border: 1px solid #ddd;
                    padding: 8px;
                    border-radius: 4px;
                "
            >
                <!-- populated dynamically -->
            </div>
            <div
                style="
                    display: flex;
                    justify-content: space-between;
                    margin-top: 10px;
                    gap: 8px;
                "
            >
                <button
                    id="uploads-clear-all"
                    class="tool-btn"
                    title="Remove all"
                >
                    <i class="fa-solid fa-trash"></i> Remove all
                </button>
                <button id="uploads-done" class="tool-btn" title="Done">
                    <i class="fa-solid fa-check"></i> Done
                </button>
            </div>
        </div>

        <!-- Search popup -->
        <div
            id="search-popup"
            class="hidden"
            tabindex="-1"
            aria-modal="true"
            role="dialog"
            style="
                position: fixed;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -30%);
                background: #fff;
                border: 1px solid #888;
                padding: 1.5em;
                z-index: 1000;
                box-shadow: 0 2px 16px #0002;
                min-width: 360px;
                display: none;
            "
        >
            <div
                style="
                    margin-bottom: 0.75em;
                    font-weight: bold;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 8px;
                "
            >
                <span>Search Boxes</span>
                <button
                    id="search-close-btn"
                    class="tool-btn"
                    title="Close"
                    style="padding: 4px 8px"
                >
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <input
                id="search-input"
                type="text"
                placeholder="Search boxes..."
                autocomplete="off"
                style="width: 100%; box-sizing: border-box; margin-bottom: 0.5em; font-size: 1em"
            />
            <div
                id="search-results"
                style="
                    max-height: 40vh;
                    overflow: auto;
                    border: 1px solid #ddd;
                    padding: 4px;
                    border-radius: 4px;
                "
            >
                <!-- populated dynamically -->
            </div>
            <div
                style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-top: 10px;
                    gap: 8px;
                "
            >
                <button
                    id="search-remove-all-btn"
                    class="tool-btn"
                    title="Remove all selections"
                >
                    <i class="fa-solid fa-trash"></i> Remove all
                </button>
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        font-size: 13px;
                        cursor: pointer;
                        white-space: nowrap;
                    "
                >
                    <input id="search-expand-checkbox" type="checkbox" />
                    Expand selected
                </label>
                <button id="search-apply-btn" class="tool-btn" title="Apply Selection">
                    <i class="fa-solid fa-check"></i> Apply
                </button>
            </div>
        </div>

        <script>
            window.initPage();
            window.handleInputQueryParam();
            window.loadYamlInput();
            window.loadSVGFromWasm();

            (function updateToolbarVersion() {
                const versionLabel = document.getElementById(
                    "toolbar-version-label",
                );
                if (!versionLabel) return;
                const uiVersion = window.uiVersion || "n/a";
                const renderingVersion = window.renderingVersion || "n/a";
                versionLabel.textContent = `Version: ${uiVersion} (rendering: ${renderingVersion})`;
            })();

            // Expand All logic
            (function () {
                const btnExpandAll = document.getElementById("btn-expand-all");
                if (!btnExpandAll) return;
                btnExpandAll.addEventListener("click", function () {
                    if (
                        !window.getAllBoxIds ||
                        !window.applyBadgeState ||
                        !window.reloadSvgFromBadges
                    ) {
                        alert(
                            "Expand All is not available: missing required functions.",
                        );
                        return;
                    }
                    // Get all box ids, filter out blacklisted
                    const allBoxIds = window.getAllBoxIds();
                    const blacklist =
                        window.blacklist && Array.isArray(window.blacklist)
                            ? window.blacklist
                            : window.blacklist || [];
                    const toExpand = allBoxIds.filter(
                        (id) => !blacklist.includes(id),
                    );
                    // Build badge state objects
                    const badgeState = toExpand.map((id) => ({
                        id: "",
                        hid: id,
                    }));
                    window.applyBadgeState(badgeState);
                    window.reloadSvgFromBadges(true);
                });
            })();

            // Permalink logic
            (function () {
                const btn = document.getElementById("btn-permalink");
                const popup = document.getElementById("permalink-popup");
                const urlInput = document.getElementById("permalink-url");
                const copyBtn = document.getElementById("permalink-copy-btn");
                // Helper to get expanded/blacklisted ids (assume global functions or arrays)
                function getExpandedIds() {
                    // Return the data-hid of all badges in #badge-list
                    const list = document.getElementById("badge-list");
                    if (!list) return [];
                    return Array.from(list.querySelectorAll(".badge"))
                        .map((b) => b.dataset.hid)
                        .filter(Boolean);
                }
                function getBlacklistedIds() {
                    // Return the data-hid of all badges in #blacklist-list
                    const list = document.getElementById("blacklist-list");
                    if (!list) return [];
                    return Array.from(list.querySelectorAll(".badge"))
                        .map((b) => b.dataset.hid)
                        .filter(Boolean);
                }
                function getInputVar() {
                    // Use the currently loaded YAML filename if available
                    if (window.currentYamlFile) return window.currentYamlFile;
                    if (window.input) return window.input;
                    const el = document.getElementById("input");
                    return el ? el.value : "";
                }
                function getComboValues() {
                    let values = [];
                    if (
                        typeof window.getToolbarComboSelectionValues ===
                        "function"
                    ) {
                        const raw = window.getToolbarComboSelectionValues();
                        values = Array.isArray(raw) ? raw : [];
                    } else {
                        const sel = document.getElementById("toolbar-combo");
                        if (sel && sel.value) values = [sel.value];
                    }
                    return values.filter((v) => v !== "__search_result__");
                }
                function makePermalink() {
                    const params = new URLSearchParams();
                    // Always include the original 'input' query parameter if present in the URL
                    const origInput = (function () {
                        const urlParams = new URLSearchParams(
                            window.location.search,
                        );
                        return urlParams.has("input")
                            ? urlParams.get("input")
                            : "";
                    })();
                    if (origInput) params.set("input", origInput);
                    // Also include the original 'options' query parameter if present in the URL
                    const origOptions = (function () {
                        const urlParams = new URLSearchParams(
                            window.location.search,
                        );
                        return urlParams.has("options")
                            ? urlParams.get("options")
                            : "";
                    })();
                    if (origOptions) params.set("options", origOptions);
                    const comboValues = getComboValues();
                    if (comboValues.length === 1) {
                        params.set("combo", comboValues[0]);
                    } else if (comboValues.length > 1) {
                        params.set("combo", comboValues.join(","));
                    }
                    const expanded = getExpandedIds();
                    if (expanded && expanded.length)
                        params.set("expandedIds", expanded.join(","));
                    const blacklisted = getBlacklistedIds();
                    if (blacklisted && blacklisted.length)
                        params.set("blacklistedIds", blacklisted.join(","));
                    const searchIds =
                        typeof window.getSearchSelectedIds === "function"
                            ? window.getSearchSelectedIds()
                            : [];
                    if (searchIds.length)
                        params.set("search_ids", searchIds.join(","));
                    return (
                        window.location.origin +
                        window.location.pathname +
                        "?" +
                        params.toString()
                    );
                }
                function showPopup(link) {
                    urlInput.value = link;
                    popup.classList.remove("hidden");
                    popup.style.display = "block";
                    urlInput.focus();
                    urlInput.select();
                }
                function hidePopup() {
                    popup.classList.add("hidden");
                    popup.style.display = "none";
                }
                btn.addEventListener("click", function () {
                    const link = makePermalink();
                    showPopup(link);
                });
                copyBtn.addEventListener("click", function () {
                    urlInput.select();
                    document.execCommand("copy");
                    hidePopup();
                });
                // Hide popup on ESC
                popup.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") {
                        hidePopup();
                    }
                });
                // Hide popup if clicking outside
                document.addEventListener("mousedown", function (e) {
                    if (
                        !popup.classList.contains("hidden") &&
                        !popup.contains(e.target) &&
                        e.target !== btn
                    ) {
                        hidePopup();
                    }
                });
            })();

            // Grouped connection line highlighting (delegated handlers)
            (function () {
                const canvas = document.getElementById("canvas");
                if (!canvas) return;
                const zRestoreMap = new WeakMap();
                const highlightableTags = new Set(["line", "circle", "text"]);
                const activeGroupHighlights = new Set();

                function updateNonHighlightedConnections() {
                    const svg = canvas.querySelector("svg");
                    if (!svg) return;
                    const shouldDim = activeGroupHighlights.size > 0;
                    const connectionLines =
                        svg.querySelectorAll("line.connection");
                    connectionLines.forEach((line) => {
                        const isHighlighted =
                            line.classList.contains("highlight-group");
                        if (shouldDim && !isHighlighted) {
                            line.classList.add("connection-dimmed");
                        } else {
                            line.classList.remove("connection-dimmed");
                        }
                    });
                    const commentNodes = svg.querySelectorAll("circle, text");
                    commentNodes.forEach((node) => {
                        if (
                            node.classList &&
                            node.classList.contains("connection-runner-dot")
                        ) {
                            return;
                        }
                        if (!getGroupClass(node)) return;
                        const isHighlighted =
                            node.classList.contains("highlight-group");
                        if (shouldDim && !isHighlighted) {
                            node.classList.add("connection-comment-dimmed");
                        } else {
                            node.classList.remove("connection-comment-dimmed");
                        }
                    });
                    const runnerDots = svg.querySelectorAll(
                        ".connection-runner-dot",
                    );
                    runnerDots.forEach((dot) => {
                        const isHighlighted =
                            dot.classList.contains("highlight-group");
                        if (shouldDim && !isHighlighted) {
                            dot.classList.add("runner-dimmed");
                        } else {
                            dot.classList.remove("runner-dimmed");
                        }
                    });
                }

                function getGroupClass(classListOrElement) {
                    if (!classListOrElement) return null;
                    const classes = [];
                    if (classListOrElement instanceof DOMTokenList) {
                        classes.push(...classListOrElement);
                    } else if (classListOrElement.classList) {
                        classes.push(...classListOrElement.classList);
                    }
                    const raw =
                        (classListOrElement.getAttribute &&
                            classListOrElement.getAttribute("class")) ||
                        (classListOrElement.className &&
                        typeof classListOrElement.className.baseVal === "string"
                            ? classListOrElement.className.baseVal
                            : typeof classListOrElement.className === "string"
                              ? classListOrElement.className
                              : "");
                    if (raw) {
                        raw.split(/\s+/)
                            .filter(Boolean)
                            .forEach((c) => classes.push(c));
                    }
                    for (const c of classes) {
                        if (/^conLine_\d+$/.test(c)) return c;
                    }
                    return null;
                }

                function bringToFront(el) {
                    if (!el || !el.parentNode || zRestoreMap.has(el)) return;
                    zRestoreMap.set(el, {
                        parent: el.parentNode,
                        nextSibling: el.nextSibling,
                    });
                    el.parentNode.appendChild(el);
                }

                function restoreZOrder(el) {
                    const info = zRestoreMap.get(el);
                    if (!info) return;
                    const { parent, nextSibling } = info;
                    if (parent) {
                        if (nextSibling && nextSibling.parentNode === parent) {
                            parent.insertBefore(el, nextSibling);
                        } else {
                            parent.appendChild(el);
                        }
                    }
                    zRestoreMap.delete(el);
                }

                function addHighlight(groupClass) {
                    const svg = canvas.querySelector("svg");
                    if (!svg || !groupClass) return;
                    if (activeGroupHighlights.has(groupClass)) return;
                    const lines = svg.querySelectorAll(
                        `line.connection.${groupClass}`,
                    );
                    for (const line of lines) {
                        line.classList.add("highlight-group");
                    }
                    const circles = svg.querySelectorAll(
                        `circle.${groupClass}`,
                    );
                    for (const circle of circles) {
                        circle.classList.add("highlight-group");
                        bringToFront(circle);
                    }
                    const texts = svg.querySelectorAll(`text.${groupClass}`);
                    for (const text of texts) {
                        text.classList.add("highlight-group");
                        bringToFront(text);
                    }
                    const runners = svg.querySelectorAll(
                        `.connection-runner-dot.${groupClass}`,
                    );
                    for (const dot of runners) {
                        dot.classList.add("highlight-group");
                    }
                    activeGroupHighlights.add(groupClass);
                    updateNonHighlightedConnections();
                    if (
                        typeof window.highlightCommentLegendByGroupClass ===
                        "function"
                    ) {
                        window.highlightCommentLegendByGroupClass(groupClass);
                    }
                }

                function removeHighlight(groupClass) {
                    const svg = canvas.querySelector("svg");
                    if (!svg || !groupClass) return;
                    if (!activeGroupHighlights.has(groupClass)) return;
                    const lines = svg.querySelectorAll(
                        `line.connection.${groupClass}.highlight-group`,
                    );
                    for (const line of lines) {
                        line.classList.remove("highlight-group");
                    }
                    const circles = svg.querySelectorAll(
                        `circle.${groupClass}.highlight-group`,
                    );
                    for (const circle of circles) {
                        circle.classList.remove("highlight-group");
                        restoreZOrder(circle);
                    }
                    const texts = svg.querySelectorAll(
                        `text.${groupClass}.highlight-group`,
                    );
                    for (const text of texts) {
                        text.classList.remove("highlight-group");
                        restoreZOrder(text);
                    }
                    const runners = svg.querySelectorAll(
                        `.connection-runner-dot.${groupClass}.highlight-group`,
                    );
                    for (const dot of runners) {
                        dot.classList.remove("highlight-group");
                    }
                    activeGroupHighlights.delete(groupClass);
                    updateNonHighlightedConnections();
                    if (
                        typeof window.unhighlightCommentLegendByGroupClass ===
                        "function"
                    ) {
                        window.unhighlightCommentLegendByGroupClass(groupClass);
                    }
                }

                function isHighlightableTarget(el) {
                    if (!el || !el.tagName) return false;
                    const tag = el.tagName.toLowerCase();
                    if (!highlightableTags.has(tag)) return false;
                    if (tag === "line") {
                        return el.classList.contains("connection");
                    }
                    return true;
                }

                // Use mouseover/mouseout with delegation; avoid flicker by checking relatedTarget
                canvas.addEventListener("mouseover", function (e) {
                    const t = e.target;
                    if (!isHighlightableTarget(t)) return;
                    const grp = getGroupClass(t);
                    if (grp) addHighlight(grp);
                });

                canvas.addEventListener("mouseout", function (e) {
                    const t = e.target;
                    if (!isHighlightableTarget(t)) return;
                    const grp = getGroupClass(t);
                    const rt = e.relatedTarget;
                    const movingWithinGroup =
                        rt &&
                        isHighlightableTarget(rt) &&
                        grp &&
                        rt.classList &&
                        rt.classList.contains(grp);
                    if (!movingWithinGroup && grp) removeHighlight(grp);
                });

                canvas.addEventListener("htmx:afterSwap", function (evt) {
                    if (!evt || evt.target !== canvas) return;
                    activeGroupHighlights.clear();
                    updateNonHighlightedConnections();
                });

                window.highlightConnectionGroup = function (groupClass) {
                    addHighlight(groupClass);
                };
                window.unhighlightConnectionGroup = function (groupClass) {
                    removeHighlight(groupClass);
                };
            })();

            // Search popup logic
            (function () {
                const btn = document.getElementById("btn-search");
                const popup = document.getElementById("search-popup");
                const closeBtn = document.getElementById("search-close-btn");
                const input = document.getElementById("search-input");
                const results = document.getElementById("search-results");
                if (!btn || !popup || !input || !results) return;

                let allItems = [];
                let selectedIds = new Set();
                let indexPromise = null; // pending or resolved build
                let indexBuiltForInput = null; // which window.input the index covers

                const applyBtn = document.getElementById("search-apply-btn");
                const removeAllBtn = document.getElementById("search-remove-all-btn");
                const expandCheckbox = document.getElementById("search-expand-checkbox");

                function updateBtnState() {
                    btn.classList.toggle("active", selectedIds.size > 0);
                }

                function buildSearchIndex() {
                    const yaml =
                        typeof window.input === "string" ? window.input : "";
                    // Skip if already built for this input
                    if (indexPromise && indexBuiltForInput === yaml)
                        return indexPromise;
                    indexBuiltForInput = yaml;
                    if (typeof window.getSearchableItems !== "function") {
                        indexPromise = Promise.resolve();
                        return indexPromise;
                    }
                    const mixins =
                        typeof getCombinedMixins === "function"
                            ? getCombinedMixins()
                            : [];
                    indexPromise = Promise.resolve()
                        .then(() => window.getSearchableItems(yaml, mixins))
                        .then((json) => {
                            try {
                                allItems = JSON.parse(json);
                            } catch (e) {
                                allItems = [];
                            }
                        })
                        .catch(() => {
                            allItems = [];
                        });
                    return indexPromise;
                }

                // Expose selected IDs for permalink writing
                window.getSearchSelectedIds = function () {
                    return Array.from(selectedIds);
                };

                let searchStateRestored = false;

                // Rebuild index eagerly in background whenever the SVG re-renders
                // with a new input, so the index is ready before the user opens
                // the popup. Also restore search state from permalink on first render.
                document
                    .getElementById("canvas")
                    .addEventListener("htmx:afterSwap", function () {
                        const yaml =
                            typeof window.input === "string"
                                ? window.input
                                : "";
                        if (yaml && yaml !== indexBuiltForInput) {
                            buildSearchIndex();
                        }
                        if (
                            !searchStateRestored &&
                            Array.isArray(window.querySearchIds) &&
                            window.querySearchIds.length > 0
                        ) {
                            console.log("[search] restoring from permalink, querySearchIds=", window.querySearchIds, "getSearchMixin available:", typeof window.getSearchMixin === "function");
                            searchStateRestored = true;
                            window.querySearchIds.forEach((id) =>
                                selectedIds.add(id),
                            );
                            updateBtnState();
                            applySelection();
                        }
                    });

                async function showPopup() {
                    popup.classList.remove("hidden");
                    popup.style.display = "block";
                    btn.classList.add("active");
                    input.value = "";
                    input.focus();
                    // If index is already ready this is instant; only shows
                    // "Loading…" when the popup is opened before the background
                    // build finishes.
                    if (!indexPromise || indexBuiltForInput !== window.input) {
                        results.innerHTML =
                            '<div style="padding:6px 8px;font-size:13px;color:#666;font-style:italic;">Loading…</div>';
                        await buildSearchIndex();
                    }
                    renderResults("");
                }

                function applySelection() {
                    const SEARCH_KEY = "__search_result__";

                    if (
                        selectedIds.size === 0 ||
                        typeof window.getSearchMixin !== "function"
                    ) {
                        console.log("[search] applySelection bail: size=", selectedIds.size, "getSearchMixin=", typeof window.getSearchMixin);
                        toolbarComboState.contentCache.delete(SEARCH_KEY);
                        removeToolbarComboSelection(SEARCH_KEY);
                        hidePopup();
                        return;
                    }

                    const mixinYaml = window.getSearchMixin(
                        Array.from(selectedIds),
                    );
                    console.log("[search] applySelection: selectedIds=", Array.from(selectedIds), "mixinYaml length=", mixinYaml ? mixinYaml.length : 0);
                    if (!mixinYaml) {
                        toolbarComboState.contentCache.delete(SEARCH_KEY);
                        removeToolbarComboSelection(SEARCH_KEY);
                        hidePopup();
                        return;
                    }

                    // Inject into content cache so loadYamlForComboValue
                    // returns it directly without a fetch
                    toolbarComboState.contentCache.set(SEARCH_KEY, mixinYaml);

                    if (
                        !toolbarComboState.selectedValues.includes(SEARCH_KEY)
                    ) {
                        addToolbarComboSelection(SEARCH_KEY, { silent: true });
                    }
                    // Override label after addToolbarComboSelection sets it
                    // from option lookup (which wouldn't find __search_result__)
                    toolbarComboState.selectionMeta.set(SEARCH_KEY, {
                        ...(toolbarComboState.selectionMeta.get(SEARCH_KEY) ||
                            {}),
                        label: "Search Result",
                    });
                    updateToolbarComboSelectedList();
                    if (expandCheckbox && expandCheckbox.checked && window.applyBadgeState) {
                        const existing = collectBadgeIds("badge-list");
                        const merged = Array.from(
                            new Set([...existing, ...Array.from(selectedIds)])
                        ).map((id) => ({ id: "", hid: id }));
                        window.applyBadgeState(merged);
                    }
                    applySelectedMixins();
                    hidePopup();
                }

                function hidePopup() {
                    popup.classList.add("hidden");
                    popup.style.display = "none";
                    // Keep btn active if items remain selected
                    updateBtnState();
                }

                function renderResults(query) {
                    results.innerHTML = "";
                    if (allItems.length === 0) {
                        results.innerHTML =
                            '<div style="padding:6px 8px;font-size:13px;color:#666;font-style:italic;">No boxes available.</div>';
                        return;
                    }
                    const q = query.toLowerCase();
                    const matches = q
                        ? allItems.filter(({ caption }) =>
                              caption.toLowerCase().includes(q),
                          )
                        : allItems;
                    if (matches.length === 0) {
                        results.innerHTML =
                            '<div style="padding:6px 8px;font-size:13px;color:#666;font-style:italic;">No results.</div>';
                        return;
                    }
                    matches.forEach(({ id, caption }) => {
                        const item = document.createElement("label");
                        item.style.cssText =
                            "display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:13px;cursor:pointer;border-radius:4px;color:#0a3d62;";
                        item.title = id;
                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.value = id;
                        checkbox.checked = selectedIds.has(id);
                        checkbox.addEventListener("change", function () {
                            if (this.checked) {
                                selectedIds.add(id);
                            } else {
                                selectedIds.delete(id);
                            }
                            updateBtnState();
                        });
                        const label = document.createElement("span");
                        label.textContent = caption;
                        item.appendChild(checkbox);
                        item.appendChild(label);
                        item.addEventListener("mouseover", function () {
                            this.style.background = "rgba(10,132,255,0.1)";
                        });
                        item.addEventListener("mouseout", function () {
                            this.style.background = "";
                        });
                        results.appendChild(item);
                    });
                }

                // Intercept badge removal for __search_result__ to keep
                // selectedIds and btn-search active state in sync.
                const _origRemoveCombo = removeToolbarComboSelection;
                removeToolbarComboSelection = function (value, options) {
                    if (value === "__search_result__") {
                        selectedIds.clear();
                        updateBtnState();
                    }
                    return _origRemoveCombo(value, options);
                };

                btn.addEventListener("click", showPopup);
                closeBtn.addEventListener("click", hidePopup);
                if (applyBtn) applyBtn.addEventListener("click", applySelection);
                if (removeAllBtn)
                    removeAllBtn.addEventListener("click", function () {
                        selectedIds.clear();
                        results
                            .querySelectorAll("input[type='checkbox']")
                            .forEach((cb) => (cb.checked = false));
                        updateBtnState();
                    });
                input.addEventListener("input", function () {
                    renderResults(this.value.trim());
                });
                popup.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") hidePopup();
                });
                document.addEventListener("mousedown", function (e) {
                    if (
                        !popup.classList.contains("hidden") &&
                        !popup.contains(e.target) &&
                        e.target !== btn
                    ) {
                        hidePopup();
                    }
                });
            })();

            // Hide Comments toggle: button logs current state to console and notifies stub
            (function () {
                const btn = document.getElementById("btn-hide-comments");
                if (!btn) return;
                // Global state for potential future use
                window.hideCommentsEnabled = false;
                btn.addEventListener("click", function () {
                    window.hideCommentsEnabled = !window.hideCommentsEnabled;
                    // Visual feedback using existing .tool-btn.active styling
                    btn.classList.toggle("active", window.hideCommentsEnabled);
                    console.log(
                        `Hide Comments: ${window.hideCommentsEnabled ? "ON" : "OFF"}`,
                    );
                    // Notify optional stub for future WASM integration
                    if (typeof window.onHideCommentsChanged === "function") {
                        try {
                            window.onHideCommentsChanged(
                                window.hideCommentsEnabled,
                            );
                        } catch (err) {
                            console.warn("onHideCommentsChanged failed:", err);
                        }
                    }
                });
            })();
        </script>
    </body>
</html>
